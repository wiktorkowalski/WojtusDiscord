name: Debug runner Claude settings

# TEMPORARY — diagnosing why the review agent's allowlisted tool calls are
# denied on this runner but not locally. Will be removed once diagnosed.

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  dump:
    runs-on: [self-hosted, homelab]
    steps:
      - name: Show runner-level Claude settings (permissions only, no credentials)
        run: |
          echo "=== whoami / HOME ==="
          whoami; echo "HOME=$HOME"
          echo "=== ls ~/.claude ==="
          ls -la "$HOME/.claude" 2>&1 || true
          echo "=== ~/.claude/settings.json ==="
          cat "$HOME/.claude/settings.json" 2>&1 || echo "(absent)"
          echo "=== ~/.claude/settings.local.json ==="
          cat "$HOME/.claude/settings.local.json" 2>&1 || echo "(absent)"
          echo "=== managed settings /etc/claude-code/managed-settings.json ==="
          cat /etc/claude-code/managed-settings.json 2>&1 || echo "(absent)"
          echo "=== workspace project settings ==="
          ls -la "$GITHUB_WORKSPACE/.claude" 2>&1 || echo "(absent)"
          cat "$GITHUB_WORKSPACE/.claude/settings.json" 2>&1 || echo "(absent)"
